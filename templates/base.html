{% load static %}  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Valoracions Profes{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'blog/style.css' %}">
</head>
<body>
 <nav class="navbar">
    <div class="nav-container">
        <a href="{% url 'blog:home' %}" class="nav-logo">ValoracioProfes</a>

        <ul class="nav-menu">
            <li><a href="{% url 'blog:home' %}" class="nav-link">Inici</a></li>
            <li><a href="{% url 'blog:professor_list' %}" class="nav-link">Professors</a></li>
        </ul>

        <div class="nav-auth">
            {% if user.is_authenticated %}
                <span class="nav-user">Hola, <strong>{{ user.username }}</strong></span>
                <form method="post" action="{% url 'logout' %}" class="inline-form">
                    {% csrf_token %}
                    <button type="submit" class="btn-logout">Sortir</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="nav-link-login">Inicia sessió</a>
                <a href="{% url 'blog:signup' %}" class="btn-signup">Registra't</a>
            {% endif %}
        </div>
    </div>
</nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <p>Valoracions Profes - 2026</p>
    </footer>

</body>
</html>
