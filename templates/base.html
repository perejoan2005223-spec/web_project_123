{% load static %}  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Blog{% endblock %}</title> <link rel="stylesheet" href="{% static 'blog/style.css' %}"> </head>
<body>
    <nav>
        <a href="{% url 'blog:home' %}">Home</a>
    </nav>

    <div class="container">
        {% block content %}{% endblock %} </div>

    <footer>
        <p>Django Blog - 2026</p>
    </footer>

<nav>
    <a href="{% url 'blog:home' %}">Home</a>
    <a href="{% url 'blog:post_list' %}">Posts</a>
    <span class="nav-right">
        {% if user.is_authenticated %}  <!-- Django checks if the user is logged in -->
            <span class="nav-user">{{ user.username }}</span>
            <!-- Logout uses a form (POST) instead of a link (GET) because it changes server state -->
            <form method="post" action="{% url 'logout' %}" class="inline-form">
                {% csrf_token %}
                <button type="submit" class="logout-btn">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
        {% endif %}
    </span>
</nav>
</body>
</html>

<!-- In templates/base.html, update the <nav> section -->
