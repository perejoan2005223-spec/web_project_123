<!-- templates/blog/post_detail.html -->

{% extends "base.html" %}

{% block title %}{{ post.title }} - My Blog{% endblock %}

{% block content %}
<article>
    <h1>{{ post.title }}</h1>
    <p class="post-meta">
        <!-- \a\t = literal "at", g=hour, i=minutes, A=AM/PM -> "February 15, 2026 at 3:30 PM" -->
        By {{ post.author.username }} - {{ post.created_at|date:"F j, Y \a\t g:i A" }}
    </p>
    <div class="post-body">{{ post.body }}</div>
</article>

<p class="back-link">
    <a href="{% url 'blog:post_list' %}">&larr; Back to all posts</a>  <!-- &larr; = <- arrow -->
</p>
{% endblock %}
