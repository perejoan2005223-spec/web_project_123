{% extends "base.html" %}

{% block title %}Professors - Valoracions Profes{% endblock %}

{% block content %}
<h1>Professors</h1>

<div class="search-box">
    <label for="id_professor">Cerca un professor:</label>
    <input id="id_professor" type="text" placeholder="Escriu un nom...">
</div>

<ul class="professor-list">
{% for professor in professors %}
    <li>
        <a href="{% url 'blog:professor_detail' professor.pk %}">
            {{ professor.name_prof }}
        </a>
    </li>
{% empty %}
    <li>No hi ha professors registrats.</li>
{% endfor %}
</ul>

<script>
$(function() {
    var professors = [
        {% for professor in professors %}
            { label: "{{ professor.name_prof }}", url: "{% url 'blog:professor_detail' professor.pk %}" }{% if not forloop.last %},{% endif %}
        {% endfor %}
    ];
    $("#id_professor").autocomplete({
        source: professors,
        select: function (event, ui){
            window.location.href = ui.item.url;
        }
    });
});
</script>

{% endblock %}
