{% extends "base.html" %}

{% block title %}Professors - Valoracions Profes{% endblock %}

{% block content %}
<h1>Professors</h1>

<div class="form-group">
    <label for="id_professor">Cerca un professor:</label>
    <input id="id_professor" type="text" placeholder="Escriu un nom...">
</div>

<ul>
{% for professor in professors %}
    <li>
        <a href="{% url 'blog:professor_detail' professor.pk %}">
            {{ professor.name_prof }}
        </a>
    </li>
{% empty %}
    <li>No hi ha professors registrats.</li>
{% endfor %}
</ul>

<script>
$(function() {
    var professors = [
        {% for professor in professors %}
            "{{ professor.name_prof }}"{% if not forloop.last %},{% endif %}
        {% endfor %}
    ];
    $("#id_professor").autocomplete({
        source: professors
    });
});
</script>

{% endblock %}
