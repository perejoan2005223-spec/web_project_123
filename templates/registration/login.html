<!-- templates/registration/login.html -->

{% extends "base.html" %}

{% block title %}Login - My Blog{% endblock %}

{% block content %}
<h1>Login</h1>

{% if form.errors %}  <!-- Django sets form.errors when login fails -->
<p class="error-text">Invalid username or password. Please try again.</p>
{% endif %}

<!-- method="post" = send form data in the request body (not in the URL) -->
<form method="post" class="form-narrow">
    {% csrf_token %}  <!-- security: adds a hidden token to prevent fake form submissions (see below) -->
    <div class="form-group">
        <label for="id_username" class="form-label">Username:</label>
        {{ form.username }}  <!-- Django renders the <input> field automatically -->
    </div>
    <div class="form-group">
        <label for="id_password" class="form-label">Password:</label>
        {{ form.password }}
    </div>
    <button type="submit" class="btn btn-blue">Login</button>
</form>
{% endblock %}
