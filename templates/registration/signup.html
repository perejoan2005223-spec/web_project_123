{% extends "base.html" %}

{% block title %}Sign Up - My Blog{% endblock %}

{% block content %}
<div class="form-narrow">
    <h1>Create an Account</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-blue">Register</button>
    </form>
    <p>Already have an account? <a href="{% url 'login' %}">Log in here</a>.</p>
</div>
{% endblock %}
